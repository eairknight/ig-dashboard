name: Daily Status Update

on:
  schedule:
    - cron: '0 14 * * *'   # 9 AM EST (UTC-5) = 14:00 UTC
  workflow_dispatch:         # manual trigger from GitHub UI Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch account statuses
        run: python update.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          DASH_PASSWORD: ${{ secrets.DASH_PASSWORD }}

      - name: Commit updated data.json
        run: |
          git config user.email "dashboard-bot@noreply.github.com"
          git config user.name "Dashboard Bot"
          git add data.json auth.json
          git diff --staged --quiet || git commit -m "chore: daily status update $(date -u '+%Y-%m-%d')"
          git push
